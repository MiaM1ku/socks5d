name: build-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.targets.outputs.json }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - id: targets
        shell: bash
        run: |
          json="$(go tool dist list | awk -F/ '
            BEGIN { printf("[") }
            $1 != "android" && $1 != "ios" && $1 != "js" && $1 != "wasip1" {
              if (count++) {
                printf(",")
              }
              printf("{\"goos\":\"%s\",\"goarch\":\"%s\"}", $1, $2)
            }
            END { printf("]") }
          ')"
          echo "json=${json}" >> "${GITHUB_OUTPUT}"

  build:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.matrix.outputs.targets) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build static binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
        shell: bash
        run: |
          ext=""
          archive="tar.gz"
          if [ "${GOOS}" = "windows" ]; then
            ext=".exe"
            archive="zip"
          fi

          asset="socks5d-${GOOS}-${GOARCH}"
          outdir="dist/${asset}"
          mkdir -p "${outdir}"

          go build -trimpath -ldflags="-s -w" -o "${outdir}/socks5d${ext}" .
          cp README.md "${outdir}/"

          if [ "${archive}" = "zip" ]; then
            (
              cd dist
              zip -rq "${asset}.zip" "${asset}"
            )
          else
            tar -C dist -czf "dist/${asset}.tar.gz" "${asset}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.goos }}-${{ matrix.target.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
